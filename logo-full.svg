<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100">
  <defs>
    <linearGradient id="arcGradF" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#06b6d4"/>
      <stop offset="60%"  stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0f2d5e"/>
    </linearGradient>
  </defs>

  <!-- ── Icon mark (scaled to 100×100 within left 100px) ── -->
  <g transform="translate(0,0) scale(1)">
    <!-- C-arc -->
    <path d="M 77.6 82.9 A 43 43 0 1 0 77.6 17.1"
          fill="none" stroke="url(#arcGradF)" stroke-width="9" stroke-linecap="round"/>
    <!-- Bars -->
    <rect x="36" y="51" width="8" height="19" rx="2" fill="#0f2d5e"/>
    <rect x="47" y="41" width="8" height="29" rx="2" fill="#0f2d5e"/>
    <rect x="58" y="33" width="8" height="37" rx="2" fill="#0f2d5e"/>
    <!-- ECG -->
    <polyline points="0,62 11,62 15,56 18,72 22,16 26,62 100,62"
              fill="none" stroke="#22c55e" stroke-width="2.8"
              stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Starburst -->
    <g stroke="#22c55e" stroke-width="2" stroke-linecap="round">
      <line x1="22" y1="10" x2="22" y2="6"/>
      <line x1="26" y1="12" x2="29" y2="9"/>
      <line x1="28" y1="16" x2="32" y2="16"/>
      <line x1="26" y1="20" x2="29" y2="23"/>
      <line x1="18" y1="12" x2="15" y2="9"/>
      <line x1="16" y1="16" x2="12" y2="16"/>
      <line x1="18" y1="20" x2="15" y2="23"/>
    </g>
  </g>

  <!-- ── Wordmark ── -->
  <text x="112" y="66"
        font-family="'Inter','Segoe UI',system-ui,sans-serif"
        font-weight="800" font-size="52" letter-spacing="-1"
        fill="#0f2d5e">Nyrix</text>

  <!-- ── Tagline ── -->
  <text x="115" y="86"
        font-family="'Inter','Segoe UI',system-ui,sans-serif"
        font-size="13" fill="#64748b">
    - Engineered by <tspan font-weight="700" fill="#0f2d5e">Aazhara</tspan>
  </text>
</svg>
