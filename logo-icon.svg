<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="arcGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#06b6d4"/>
      <stop offset="60%"  stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0f2d5e"/>
    </linearGradient>
  </defs>

  <!-- C-arc: center(50,50), r=43, opening on right ~50° each side -->
  <!-- Start: angle 50° → (77.6, 82.9)  End: angle -50° → (77.6, 17.1) -->
  <path d="M 77.6 82.9 A 43 43 0 1 0 77.6 17.1"
        fill="none" stroke="url(#arcGrad)" stroke-width="9" stroke-linecap="round"/>

  <!-- Bar chart (navy, ascending, bottom-aligned at y=70) -->
  <rect x="36" y="51" width="8" height="19" rx="2" fill="#0f2d5e"/>
  <rect x="47" y="41" width="8" height="29" rx="2" fill="#0f2d5e"/>
  <rect x="58" y="33" width="8" height="37" rx="2" fill="#0f2d5e"/>

  <!-- ECG waveform (SLA green) — enters left, spikes at x≈22, exits right -->
  <polyline
    points="0,62 11,62 15,56 18,72 22,16 26,62 100,62"
    fill="none" stroke="#22c55e" stroke-width="2.8"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Starburst at spike peak (22, 16) — 8-ray asterisk -->
  <g stroke="#22c55e" stroke-width="2" stroke-linecap="round">
    <line x1="22" y1="10" x2="22" y2="6"/>
    <line x1="26" y1="12" x2="29" y2="9"/>
    <line x1="28" y1="16" x2="32" y2="16"/>
    <line x1="26" y1="20" x2="29" y2="23"/>
    <line x1="18" y1="12" x2="15" y2="9"/>
    <line x1="16" y1="16" x2="12" y2="16"/>
    <line x1="18" y1="20" x2="15" y2="23"/>
  </g>
</svg>
